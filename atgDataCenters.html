<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alliance Technical Group | Data Center Compliance, End to End</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     BRAND TOKENS - swap these to match ATG brand hex values
     ============================================================ */
  :root{
    --atg-accent:   #DD6E0C;   /* accent / featured */
    --atg-blue:    #2E7DD1;   /* interactive */
    --ink:         #0A1420;   /* page + sky */
    --panel:       rgba(13, 24, 38, 0.88);
    --panel-line:  rgba(221, 110, 12, 0.25);
    --text:        #E8EEF4;
    --text-dim:    #93A4B5;
    --tag-bg:      rgba(46, 125, 209, 0.16);
    --tag-line:    rgba(46, 125, 209, 0.45);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:var(--ink); color:var(--text);
    font-family:'IBM Plex Sans', sans-serif; }
  #scene{ position:fixed; inset:0; cursor:grab; }
  #scene.dragging{ cursor:grabbing; }
  canvas{ display:block; }

  /* ---------- header ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:30;
    display:flex; align-items:center; gap:18px;
    padding:18px 28px 14px;
    background:linear-gradient(180deg, rgba(10,20,32,0.92), rgba(10,20,32,0));
    pointer-events:none;
  }
  .logo{ height:38px; width:auto; display:block;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
  .headline{
    font-family:'Barlow Condensed', sans-serif; font-weight:500; font-size:18px;
    letter-spacing:0.04em; color:var(--text-dim);
  }
  .audience{
    margin-left:auto; margin-right:130px; font-family:'IBM Plex Mono', monospace; font-size:11px;
    letter-spacing:0.08em; color:var(--text-dim); text-transform:uppercase;
  }

  /* ---------- left rail ---------- */
  #rail{
    position:fixed; left:24px; top:50%; transform:translateY(-50%); z-index:30;
    width:236px; display:flex; flex-direction:column; gap:6px;
  }
  .rail-label{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--text-dim); padding:0 2px 6px;
  }
  .svc{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid rgba(255,255,255,0.07);
    border-left:3px solid transparent; border-radius:6px;
    padding:9px 12px; cursor:pointer; user-select:none;
    transition:border-color .18s, background .18s, transform .18s;
    backdrop-filter: blur(6px);
  }
  .svc:hover{ border-left-color:var(--atg-blue); transform:translateX(2px); }
  .svc.active{ border-left-color:var(--atg-accent); border-color:var(--panel-line);
    background:rgba(20, 36, 54, 0.95); }
  .svc .num{
    font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-dim);
    min-width:18px;
  }
  .svc.active .num{ color:var(--atg-accent); }
  .svc .nm{
    font-family:'Barlow Condensed', sans-serif; font-weight:600; font-size:16px;
    letter-spacing:0.03em; line-height:1.1;
  }
  .svc .feat{
    margin-left:auto; font-family:'IBM Plex Mono', monospace; font-size:9px;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--ink);
    background:var(--atg-accent); border-radius:3px; padding:2px 6px; font-weight:500;
  }
  #tourBtn{
    margin-top:10px; padding:11px 14px; border-radius:6px; border:1px solid var(--atg-accent);
    background:rgba(221,110,12,0.12); color:var(--atg-accent); cursor:pointer;
    font-family:'Barlow Condensed', sans-serif; font-weight:600; font-size:16px;
    letter-spacing:0.08em; text-transform:uppercase; transition:background .18s;
  }
  #tourBtn:hover{ background:rgba(221,110,12,0.22); }

  /* ---------- detail card ---------- */
  #card{
    position:fixed; right:24px; top:50%; transform:translateY(-50%); z-index:30;
    width:360px; max-height:78vh; overflow:auto;
    background:var(--panel); border:1px solid var(--panel-line); border-radius:10px;
    padding:22px 24px 20px; backdrop-filter: blur(8px);
    box-shadow:0 18px 50px rgba(0,0,0,0.45);
  }
  #card .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--atg-accent); margin-bottom:8px;
  }
  #card h2{
    font-family:'Barlow Condensed', sans-serif; font-weight:700; font-size:30px;
    letter-spacing:0.02em; line-height:1.05; color:#fff; margin-bottom:6px;
  }
  #card .tagline{ font-size:13.5px; color:var(--text-dim); margin-bottom:14px; line-height:1.45; }
  #card ul{ list-style:none; display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  #card li{
    font-size:13px; line-height:1.5; padding-left:14px; position:relative; color:var(--text);
  }
  #card li::before{
    content:""; position:absolute; left:0; top:8px; width:6px; height:2px;
    background:var(--atg-accent);
  }
  #card .tags{ display:flex; flex-wrap:wrap; gap:6px; }
  #card .tag{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.04em;
    color:#BFD9F2; background:var(--tag-bg); border:1px solid var(--tag-line);
    border-radius:4px; padding:3px 8px;
  }
  #card .actions{ display:flex; gap:10px; margin-top:18px; }
  #card .actions button{
    flex:1; padding:11px 10px; border-radius:6px; cursor:pointer;
    font-family:'Barlow Condensed', sans-serif; font-weight:600; font-size:15px;
    letter-spacing:0.07em; text-transform:uppercase; transition:filter .15s;
  }
  #card .actions button:hover{ filter:brightness(1.15); }
  .btn-primary{ background:var(--atg-accent); border:none; color:var(--ink); }
  .btn-ghost{ background:transparent; border:1px solid rgba(255,255,255,0.25); color:var(--text); }

  /* ---------- tour bar ---------- */
  #tourbar{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:30;
    display:none; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--panel-line); border-radius:999px;
    padding:8px 16px; backdrop-filter: blur(8px);
  }
  #tourbar.on{ display:flex; }
  #tourbar button{
    background:none; border:none; color:var(--text); cursor:pointer; font-size:16px;
    padding:4px 8px; border-radius:6px;
  }
  #tourbar button:hover{ background:rgba(255,255,255,0.08); }
  #tourbar .pos{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.1em;
    color:var(--text-dim); min-width:54px; text-align:center;
  }
  #tourbar .end{ color:var(--text-dim); font-size:12px; font-family:'IBM Plex Mono', monospace; }

  /* ---------- hint ---------- */
  #hint{
    position:fixed; bottom:22px; right:28px; z-index:20;
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.08em;
    color:var(--text-dim); text-transform:uppercase; pointer-events:none;
  }

  /* ---------- 3D markers ---------- */
  #markers{ position:fixed; inset:0; z-index:20; pointer-events:none; overflow:hidden; }
  .marker{ position:absolute; transform:translate(-50%, 0); pointer-events:none;
    transition:opacity .25s; }
  .marker .stem{
    position:absolute; left:50%; bottom:0; width:1px; height:54px;
    background:linear-gradient(180deg, rgba(232,238,244,0.85), rgba(232,238,244,0.1));
  }
  .marker .dot{
    position:absolute; left:50%; bottom:-4px; width:8px; height:8px;
    transform:translateX(-50%); border-radius:50%;
    background:var(--atg-blue); box-shadow:0 0 8px rgba(46,125,209,0.9);
  }
  .marker .lbl{
    position:absolute; left:50%; bottom:54px; transform:translateX(-50%);
    white-space:nowrap; pointer-events:auto; cursor:pointer;
    font-family:'Barlow Condensed', sans-serif; font-weight:600; font-size:13.5px;
    letter-spacing:0.06em; text-transform:uppercase;
    color:var(--text); background:rgba(13,24,38,0.82);
    border:1px solid rgba(255,255,255,0.18); border-radius:4px;
    padding:4px 10px; backdrop-filter:blur(4px);
    transition:border-color .15s, color .15s;
  }
  .marker .lbl:hover{ border-color:var(--atg-blue); color:#fff; }
  .marker.featured .dot{ background:var(--atg-accent); box-shadow:0 0 10px rgba(221,110,12,1); }
  .marker.featured .dot::after{
    content:""; position:absolute; inset:-7px; border-radius:50%;
    border:1.5px solid var(--atg-accent); animation:pulse 2s ease-out infinite;
  }
  .marker.featured .lbl{ border-color:rgba(221,110,12,0.6); color:#F6DCBA; }
  .marker.sel .lbl{ border-color:var(--atg-accent); color:#fff;
    background:rgba(58,37,15,0.9); }
  @keyframes pulse{
    0%{ transform:scale(0.5); opacity:1; }
    100%{ transform:scale(1.6); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .marker.featured .dot::after{ animation:none; opacity:0.6; }
  }

  /* ---------- fullscreen button ---------- */
  #fsBtn{
    position:fixed; top:18px; right:24px; z-index:40;
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid rgba(255,255,255,0.18);
    border-radius:6px; padding:7px 12px; cursor:pointer;
    color:var(--text); backdrop-filter:blur(6px);
    font-family:'IBM Plex Mono', monospace; font-size:10.5px;
    letter-spacing:0.1em; text-transform:uppercase;
    transition:border-color .15s, background .15s;
  }
  #fsBtn:hover{ border-color:var(--atg-accent); background:rgba(20,36,54,0.95); }
  #fsBtn svg{ width:13px; height:13px; stroke:currentColor; stroke-width:2;
    fill:none; stroke-linecap:round; stroke-linejoin:round; }

  /* ---------- responsive ---------- */
  @media (max-width: 1100px){
    #rail{ width:200px; }
    #card{ width:320px; }
  }
  @media (max-width: 860px){
    header .headline{ display:none; }
    #rail{ left:12px; bottom:12px; top:auto; transform:none; width:auto;
      flex-direction:row; flex-wrap:wrap; max-width:60vw; }
    .svc .num, .svc .feat{ display:none; }
    #card{ right:12px; left:auto; width:min(320px, 46vw); }
    #hint{ display:none; }
  }
</style>
</head>

function mat(color, opts={}){
  return new THREE.MeshLambertMaterial(Object.assign({ color }, opts));
}
function box(w,h,d, color, x,y,z, opts={}){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat(color, opts.mat||{}));
  m.position.set(x,y,z);
  if(opts.ry) m.rotation.y = opts.ry;
  m.castShadow = opts.shadow !== false;
  m.receiveShadow = true;
  world.add(m);
  return m;
}
function cyl(rt, rb, h, color, x,y,z, seg=14){
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat(color));
  m.position.set(x,y,z);
  m.castShadow = true; m.receiveShadow = true;
  world.add(m);
  return m;
}

/* =========================================================================
   CAMERA - custom orbit with smooth tweening
   ========================================================================= */
const cam = {
  target: new THREE.Vector3(0, 4, 0),
  theta: 0.85, phi: 1.02, radius: 175,
  dTarget: new THREE.Vector3(0, 4, 0),
  dTheta: 0.85, dPhi: 1.02, dRadius: 175
};
const DEFAULT_CAM = { target:[0,4,0], theta:0.85, phi:1.02, radius:175 };

function applyCamera(){
  cam.target.lerp(cam.dTarget, 0.07);
  cam.theta  += (cam.dTheta  - cam.theta)  * 0.07;
  cam.phi    += (cam.dPhi    - cam.phi)    * 0.07;
  cam.radius += (cam.dRadius - cam.radius) * 0.07;
  const sp = Math.sin(cam.phi), cp = Math.cos(cam.phi);
  camera.position.set(
    cam.target.x + cam.radius * sp * Math.sin(cam.theta),
    cam.target.y + cam.radius * cp,
    cam.target.z + cam.radius * sp * Math.cos(cam.theta)
  );
  camera.lookAt(cam.target);
}
function flyTo(preset){
  cam.dTarget.set(preset.target[0], preset.target[1], preset.target[2]);
  cam.dTheta = preset.theta;
  cam.dPhi   = preset.phi;
  cam.dRadius= preset.radius;
}

/* pointer controls */
let dragging = false, lastX = 0, lastY = 0, lastInteract = 0;
const pointers = new Map();

container.addEventListener('pointerdown', e => {
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  container.classList.add('dragging');
  container.setPointerCapture(e.pointerId);
});
container.addEventListener('pointermove', e => {
  if(!dragging) return;
  lastInteract = performance.now();
  if(pointers.size === 2){
    const pts = [...pointers.values()];
    const prevDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    const pts2 = [...pointers.values()];
    const newDist = Math.hypot(pts2[0].x - pts2[1].x, pts2[0].y - pts2[1].y);
    cam.dRadius = THREE.MathUtils.clamp(cam.dRadius * (prevDist / Math.max(newDist, 1)), 28, 280);
    return;
  }
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  cam.dTheta -= dx * 0.005;
  cam.dPhi = THREE.MathUtils.clamp(cam.dPhi - dy * 0.004, 0.25, 1.42);
  cam.theta = cam.dTheta; cam.phi = cam.dPhi;   // direct while dragging
});
function endPointer(e){
  pointers.delete(e.pointerId);
  if(pointers.size === 0){ dragging = false; container.classList.remove('dragging'); }
}
container.addEventListener('pointerup', endPointer);
container.addEventListener('pointercancel', endPointer);
container.addEventListener('wheel', e => {
  e.preventDefault();
  lastInteract = performance.now();
  cam.dRadius = THREE.MathUtils.clamp(cam.dRadius * (1 + e.deltaY * 0.0011), 28, 280);
}, { passive:false });

/* =========================================================================
   MARKERS (DOM overlay with leader stems)
   ========================================================================= */
const markersEl = document.getElementById('markers');
const markerDefs = [];

SERVICES.forEach(s => markerDefs.push({ id:s.id, label:s.short, anchor:s.anchor, featured:!!s.featured }));
EXTRA_MARKERS.forEach(m => markerDefs.push({ id:m.id, label:m.label, anchor:m.anchor, featured:false }));

markerDefs.forEach(def => {
  const el = document.createElement('div');
  el.className = 'marker' + (def.featured ? ' featured' : '');
  el.innerHTML = '<div class="stem"></div><div class="dot"></div><div class="lbl">' + def.label + '</div>';
  el.querySelector('.lbl').addEventListener('click', () => selectService(def.id, true));
  markersEl.appendChild(el);
  def.el = el;
  def.v = new THREE.Vector3();
});

function updateMarkers(){
  const w = window.innerWidth, h = window.innerHeight;
  markerDefs.forEach(def => {
    def.v.set(def.anchor[0], def.anchor[1], def.anchor[2]).project(camera);
    const behind = def.v.z > 1;
    const x = (def.v.x * 0.5 + 0.5) * w;
    const y = (-def.v.y * 0.5 + 0.5) * h;
    if(behind || x < -80 || x > w + 80 || y < -40 || y > h + 120){
      def.el.style.opacity = '0';
      def.el.style.pointerEvents = 'none';
      return;
    }
    def.el.style.opacity = '1';
    def.el.style.pointerEvents = '';
    def.el.style.left = x + 'px';
    def.el.style.top = (y - 54) + 'px';   // stem height offset; stem bottom lands on anchor
    def.el.style.height = '54px';
  });
}

let activeId = null;
let tour = { on:false, idx:0, timer:null };

function renderIntro(){
  card.innerHTML =
    '<div class="eyebrow">' + INTRO.eyebrow + '</div>' +
    '<h2>' + INTRO.title + '</h2>' +
    '<p class="tagline">' + INTRO.tagline + '</p>' +
    '<ul>' + INTRO.bullets.map(b => '<li>' + b + '</li>').join('') + '</ul>' +
    '<div class="actions">' +
      '<button class="btn-primary" id="ctaTour">Start the Tour</button>' +
      '<button class="btn-ghost" id="ctaStack">Stack Testing</button>' +
    '</div>';
  document.getElementById('ctaTour').addEventListener('click', startTour);
  document.getElementById('ctaStack').addEventListener('click', () => selectService('stack', true));
}

function renderService(s){
  card.innerHTML =
    '<div class="eyebrow">' + s.num + ' / 0' + SERVICES.length + ' &middot; Alliance Technical Group</div>' +
    '<h2>' + s.name + '</h2>' +
    '<p class="tagline">' + s.tagline + '</p>' +
    '<ul>' + s.bullets.map(b => '<li>' + b + '</li>').join('') + '</ul>' +
    '<div class="tags">' + s.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' +
    '<div class="actions">' +
      '<button class="btn-ghost" id="ctaBack">Site Overview</button>' +
    '</div>';
  document.getElementById('ctaBack').addEventListener('click', clearSelection);
}

function syncUI(){
  document.querySelectorAll('.svc').forEach(el =>
    el.classList.toggle('active', el.dataset.id === activeId));
  markerDefs.forEach(def =>
    def.el.classList.toggle('sel', def.id === activeId));
}

function selectService(id, userClick){
  const s = SERVICES.find(x => x.id === id);
  if(!s) return;
  activeId = id;
  flyTo(s.cam);
  renderService(s);
  syncUI();
  if(userClick && tour.on){
    tour.idx = SERVICES.indexOf(s);
    tPos.textContent = (tour.idx + 1) + ' / ' + SERVICES.length;
    resetTourTimer();
  }
}

function clearSelection(){
  activeId = null;
  flyTo(DEFAULT_CAM);
  renderIntro();
  syncUI();
}

/* ---------- tour ---------- */
function startTour(){
  tour.on = true; tour.idx = 0;
  tourbar.classList.add('on');
  tourBtn.textContent = 'Tour Running';
  goTour(0);
}
function goTour(i){
  tour.idx = (i + SERVICES.length) % SERVICES.length;
  tPos.textContent = (tour.idx + 1) + ' / ' + SERVICES.length;
  selectService(SERVICES[tour.idx].id, false);
  resetTourTimer();
}
function resetTourTimer(){
  clearTimeout(tour.timer);
  if(reduceMotion) return;            // no auto-advance for reduced motion
  tour.timer = setTimeout(() => { if(tour.on) goTour(tour.idx + 1); }, 11000);
}
function endTour(){
  tour.on = false;
  clearTimeout(tour.timer);
  tourbar.classList.remove('on');
  tourBtn.textContent = 'Start the Tour';
}
document.getElementById('tPrev').addEventListener('click', () => goTour(tour.idx - 1));
document.getElementById('tNext').addEventListener('click', () => goTour(tour.idx + 1));
document.getElementById('tEnd').addEventListener('click', () => { endTour(); clearSelection(); });
tourBtn.addEventListener('click', () => { if(!tour.on) startTour(); });

window.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight'){ tour.on ? goTour(tour.idx + 1) : selectNext(1); }
  if(e.key === 'ArrowLeft'){ tour.on ? goTour(tour.idx - 1) : selectNext(-1); }
  if(e.key === 'Escape'){ endTour(); clearSelection(); }
});
function selectNext(dir){
  const i = SERVICES.findIndex(s => s.id === activeId);
  const next = i === -1 ? (dir > 0 ? 0 : SERVICES.length - 1) : (i + dir + SERVICES.length) % SERVICES.length;
  selectService(SERVICES[next].id, true);
}

/* ---------- fullscreen ---------- */
const fsBtn = document.getElementById('fsBtn');
function fsActive(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function toggleFullscreen(){
  const root = document.documentElement;
  if(!fsActive()){
    (root.requestFullscreen || root.webkitRequestFullscreen).call(root);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}
function syncFsUI(){
  const on = fsActive();
  document.getElementById('fsIconExpand').style.display = on ? 'none' : '';
  document.getElementById('fsIconCollapse').style.display = on ? '' : 'none';
  document.getElementById('fsLabel').textContent = on ? 'Exit' : 'Fullscreen';
}
fsBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', syncFsUI);
document.addEventListener('webkitfullscreenchange', syncFsUI);
window.addEventListener('keydown', e => {
  if((e.key === 'f' || e.key === 'F') && !e.metaKey && !e.ctrlKey) toggleFullscreen();
});

/* =========================================================================
   LOOP
   ========================================================================= */
function animate(){
  requestAnimationFrame(animate);
  // gentle idle drift on the overview only
  if(!reduceMotion && !dragging && !activeId && performance.now() - lastInteract > 5000){
    cam.dTheta += 0.0006;
  }
  applyCamera();
  updateMarkers();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

renderIntro();
syncUI();
animate();
</script>
