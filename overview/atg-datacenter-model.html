<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E2233">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Alliance Technical Group | Data Center Compliance, End to End</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     BRAND TOKENS - swap these to match ATG brand hex values
     ============================================================ */
  :root{
    --atg-accent:   #DD6E0C;   /* accent / featured */
    --atg-blue:    #214592;   /* interactive */
    --ink:         #0A1420;   /* page + sky */
    --panel:       rgba(13, 24, 38, 0.88);
    --panel-line:  rgba(221, 110, 12, 0.25);
    --text:        #E8EEF4;
    --text-dim:    #93A4B5;
    --tag-bg:      rgba(33, 69, 146, 0.20);
    --tag-line:    rgba(33, 69, 146, 0.55);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; overflow:hidden; background:var(--ink); color:var(--text);
    font-family:'Source Sans 3', sans-serif; overscroll-behavior:none; }
  #scene{ position:fixed; inset:0; cursor:grab; touch-action:none; }
  #scene.dragging{ cursor:grabbing; }
  canvas{ display:block; touch-action:none; }

  /* ---------- header ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:30;
    display:flex; align-items:center; gap:18px;
    padding:18px 28px 14px;
    background:linear-gradient(180deg, rgba(10,20,32,0.92), rgba(10,20,32,0));
    pointer-events:none;
  }
  .logo{ height:63px; width:auto; display:block;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
  .atg-headrow{ display:flex; align-items:center; gap:18px; width:100%; }
  .atg-home{
    position:fixed; left:24px; bottom:22px; z-index:40; display:inline-flex; align-items:center; gap:8px;
    pointer-events:auto; text-decoration:none; white-space:nowrap;
    background:var(--panel); border:1px solid rgba(255,255,255,0.18); border-radius:6px;
    padding:7px 12px; cursor:pointer; backdrop-filter:blur(6px); color:var(--text);
    font-family:'Source Sans 3', sans-serif; font-size:10.5px;
    letter-spacing:0.1em; text-transform:uppercase;
    transition:border-color .15s, background .15s, color .15s;
  }
  .atg-home:hover{ border-color:var(--atg-accent); background:rgba(20,36,54,0.95); color:var(--atg-accent); }
  .atg-home svg{ width:13px; height:13px; stroke:currentColor; stroke-width:2;
    fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .headline{
    font-family:'Source Sans 3', sans-serif; font-weight:500; font-size:18px;
    letter-spacing:0.04em; color:var(--text-dim);
  }
  .audience{
    margin-left:auto; margin-right:130px; font-family:'Source Sans 3', sans-serif; font-size:11px;
    letter-spacing:0.08em; color:var(--text-dim); text-transform:uppercase;
  }

  /* ---------- left rail ---------- */
  #rail{
    position:fixed; left:24px; top:50%; transform:translateY(-50%); z-index:30;
    width:236px; display:flex; flex-direction:column; gap:6px;
  }
  .rail-label{
    font-family:'Source Sans 3', sans-serif; font-size:10px; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--text-dim); padding:0 2px 6px;
  }
  .svc{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid rgba(255,255,255,0.07);
    border-left:3px solid transparent; border-radius:6px;
    padding:9px 12px; cursor:pointer; user-select:none;
    transition:border-color .18s, background .18s, transform .18s;
    backdrop-filter: blur(6px);
  }
  .svc:hover{ border-left-color:var(--atg-blue); transform:translateX(2px); }
  .svc.active{ border:1px solid transparent; border-left:3px solid transparent;
    background:var(--atg-accent); transform:translateX(2px); }
  .svc .num{
    font-family:'Source Sans 3', sans-serif; font-size:11px; color:var(--text-dim);
    min-width:18px;
  }
  .svc.active .num{ color:rgba(10,20,32,0.65); }
  .svc.active .nm{ color:var(--ink); }
  .svc.active .feat{ background:var(--ink); color:var(--atg-accent); }
  .svc .nm{
    font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:15px;
    letter-spacing:0;  line-height:1.15;
  }
  .svc .feat{
    margin-left:auto; font-family:'Source Sans 3', sans-serif; font-size:9px;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--ink);
    background:var(--atg-accent); border-radius:3px; padding:2px 6px; font-weight:500;
  }
  #tourBtn{
    margin-top:10px; padding:11px 14px; border-radius:6px; border:1px solid var(--atg-accent);
    background:rgba(221,110,12,0.12); color:var(--atg-accent); cursor:pointer;
    font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:16px;
    letter-spacing:0.08em; text-transform:uppercase; transition:background .18s;
  }
  #tourBtn:hover{ background:rgba(221,110,12,0.22); }

  /* ---------- detail card ---------- */
  #card{
    position:fixed; right:24px; top:50%; transform:translateY(-50%); z-index:30;
    width:360px; max-height:78vh; overflow:auto;
    background:var(--panel); border:1px solid var(--panel-line); border-radius:10px;
    padding:22px 24px 20px; backdrop-filter: blur(8px);
    box-shadow:0 18px 50px rgba(0,0,0,0.45);
  }
  #card .eyebrow{
    font-family:'Source Sans 3', sans-serif; font-size:10px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--atg-accent); margin-bottom:8px;
  }
  #card h2{
    font-family:'Source Sans 3', sans-serif; font-weight:700; font-size:27px;
    letter-spacing:-0.01em; line-height:1.08; color:#fff; margin-bottom:6px;
  }
  #card .tagline{ font-size:13.5px; color:var(--text-dim); margin-bottom:14px; line-height:1.45; }
  #card ul{ list-style:none; display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
  #card li{
    font-size:13px; line-height:1.5; padding-left:14px; position:relative; color:var(--text);
  }
  #card li::before{
    content:""; position:absolute; left:0; top:8px; width:6px; height:2px;
    background:var(--atg-accent);
  }
  #card .tags{ display:flex; flex-wrap:wrap; gap:6px; }
  #card .tag{
    font-family:'Source Sans 3', sans-serif; font-size:10.5px; letter-spacing:0.04em;
    color:#C8D8F2; background:var(--tag-bg); border:1px solid var(--tag-line);
    border-radius:4px; padding:3px 8px;
  }
  #card .actions{ display:flex; gap:10px; margin-top:18px; }
  #card .actions button{
    flex:1; padding:11px 10px; border-radius:6px; cursor:pointer;
    font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:15px;
    letter-spacing:0.07em; text-transform:uppercase; transition:filter .15s;
  }
  #card .actions button:hover{ filter:brightness(1.15); }
  .btn-primary{ background:var(--atg-accent); border:none; color:var(--ink); }
  .btn-ghost{ background:transparent; border:1px solid rgba(255,255,255,0.25); color:var(--text); }

  /* ---------- tour bar ---------- */
  #tourbar{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%); z-index:30;
    display:none; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--panel-line); border-radius:999px;
    padding:8px 16px; backdrop-filter: blur(8px);
  }
  #tourbar.on{ display:flex; }
  #tourbar button{
    background:none; border:none; color:var(--text); cursor:pointer; font-size:16px;
    padding:4px 8px; border-radius:6px;
  }
  #tourbar button:hover{ background:rgba(255,255,255,0.08); }
  #tourbar .pos{
    font-family:'Source Sans 3', sans-serif; font-size:11px; letter-spacing:0.1em;
    color:var(--text-dim); min-width:54px; text-align:center;
  }
  #tourbar .end{ color:var(--text-dim); font-size:12px; font-family:'Source Sans 3', sans-serif; }

  /* ---------- hint ---------- */
  #hint{
    position:fixed; bottom:22px; right:28px; z-index:20;
    font-family:'Source Sans 3', sans-serif; font-size:10.5px; letter-spacing:0.08em;
    color:var(--text-dim); text-transform:uppercase; pointer-events:none;
  }

  /* ---------- 3D markers ---------- */
  #markers{ position:fixed; inset:0; z-index:20; pointer-events:none; overflow:hidden; }
  .marker{ position:absolute; left:0; top:0; pointer-events:none;
    transition:opacity .25s; will-change:transform; backface-visibility:hidden; }
  .marker .stem{
    position:absolute; left:50%; bottom:0; width:1px; height:54px;
    background:linear-gradient(180deg, rgba(232,238,244,0.85), rgba(232,238,244,0.1));
  }
  .marker .dot{
    position:absolute; left:50%; bottom:-4px; width:8px; height:8px;
    transform:translateX(-50%); border-radius:50%;
    background:var(--atg-blue); box-shadow:0 0 8px rgba(33,69,146,0.95);
  }
  .marker .lbl{
    position:absolute; left:50%; bottom:54px; transform:translateX(-50%);
    white-space:nowrap; pointer-events:auto; cursor:pointer;
    font-family:'Source Sans 3', sans-serif; font-weight:600; font-size:12px;
    letter-spacing:0.05em; text-transform:uppercase;
    color:var(--text); background:rgba(13,24,38,0.92);
    border:1px solid rgba(255,255,255,0.18); border-radius:4px;
    padding:4px 10px;
    transition:border-color .15s, color .15s;
  }
  .marker .lbl:hover{ border-color:var(--atg-blue); color:#fff; }
  .marker.sel{ z-index:5; }
  .marker.sel .lbl{ border-color:transparent; color:var(--ink);
    background:var(--atg-accent); font-weight:700; }
  .marker.sel .dot{ background:var(--atg-accent); box-shadow:0 0 10px rgba(221,110,12,1); }

  /* ---------- fullscreen button ---------- */
  #fsBtn{
    position:fixed; top:18px; right:24px; z-index:40;
    display:flex; align-items:center; gap:8px;
    background:var(--panel); border:1px solid rgba(255,255,255,0.18);
    border-radius:6px; padding:7px 12px; cursor:pointer;
    color:var(--text); backdrop-filter:blur(6px);
    font-family:'Source Sans 3', sans-serif; font-size:10.5px;
    letter-spacing:0.1em; text-transform:uppercase;
    transition:border-color .15s, background .15s;
  }
  #fsBtn:hover{ border-color:var(--atg-accent); background:rgba(20,36,54,0.95); }
  #fsBtn svg{ width:13px; height:13px; stroke:currentColor; stroke-width:2;
    fill:none; stroke-linecap:round; stroke-linejoin:round; }

  /* ---------- responsive ---------- */
  @media (max-width: 1100px){
    #rail{ width:200px; }
    #card{ width:320px; }
  }

  /* ===== MOBILE (phones, portrait + landscape) ===== */
  @media (max-width: 760px){
    /* compact header: logo only */
    header{ flex-direction:row; align-items:center; padding:8px 12px; gap:10px;
      background:linear-gradient(180deg, rgba(10,20,32,0.95), rgba(10,20,32,0)); }
    .logo{ height:24px; }
    .atg-headrow{ gap:10px; }
    .atg-home{ position:static; padding:7px; }
    .atg-home .atg-home-label{ display:none; }
    header .headline, header .audience{ display:none; }

    /* fullscreen button: icon-only, tucked in the top-right corner above the chips */
    #fsBtn{ display:none; }
    #fsBtn #fsLabel{ display:none; }

    /* service rail becomes a horizontal scrolling chip strip under the header */
    #rail{ left:0; right:0; top:46px; bottom:auto; transform:none; width:auto;
      flex-direction:row; gap:8px; align-items:center;
      overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch;
      padding:4px 12px 8px; scrollbar-width:none;
      -webkit-mask-image:linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
              mask-image:linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%); }
    #rail::-webkit-scrollbar{ display:none; }
    .rail-label{ display:none; }
    .svc{ flex:0 0 auto; padding:9px 14px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.12); border-left:1px solid rgba(255,255,255,0.12); }
    .svc:hover{ transform:none; }
    .svc.active{ border:1px solid transparent; border-left:1px solid transparent;
      transform:none; }
    .svc .num{ display:none; }
    .svc .nm{ font-size:14px; white-space:nowrap; }
    #tourBtn{ flex:0 0 auto; order:-1; margin:0; padding:9px 16px; font-size:14px;
      border-radius:999px; }

    /* detail card becomes a bottom sheet */
    #card{ left:0; right:0; bottom:0; top:auto; transform:none; width:auto;
      max-height:54vh; max-height:54dvh; border-radius:18px 18px 0 0;
      border:1px solid var(--panel-line); border-bottom:none;
      padding:20px 20px calc(20px + env(safe-area-inset-bottom)); 
      -webkit-overflow-scrolling:touch;
      box-shadow:0 -14px 40px rgba(0,0,0,0.5); }
    #card::before{ content:""; display:block; width:38px; height:4px; border-radius:2px;
      background:rgba(255,255,255,0.22); margin:-6px auto 14px; }
    #card{ transition:max-height .3s ease; }
    #card.collapsed{ max-height:46px; overflow:hidden; cursor:pointer; padding:10px 20px 0; }
    #card.collapsed > *{ display:none; }
    #card.collapsed::before{ margin:0 auto 7px; background:rgba(255,255,255,0.34); }
    #card.collapsed::after{ content:"Tap for details"; display:block; text-align:center;
      font-family:'Source Sans 3', sans-serif; font-size:11px; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--text-dim); }
    #card h2{ font-size:24px; }
    #card .actions button{ padding:13px 10px; }   /* bigger touch targets */

    /* tour bar floats just above the sheet */
    #tourbar{ bottom:auto; top:calc(54vh + 12px); top:calc(54dvh + 12px); }
    #tourbar button{ padding:8px 12px; }   /* bigger touch targets */

    #hint{ display:none; }

    /* tighter marker labels on small screens */
    .marker .lbl{ font-size:11px; padding:3px 8px; }
  }

  /* phone landscape: dock the sheet to the right instead of bottom (vertical space is scarce) */
  @media (max-width: 760px) and (orientation: landscape){
    #rail{ top:42px; }
    #card{ left:auto; right:0; top:42px; bottom:0; width:min(330px, 46vw);
      max-height:none; border-radius:16px 0 0 0; border-bottom:1px solid var(--panel-line);
      padding:16px 18px calc(16px + env(safe-area-inset-bottom)); }
    #card::before{ display:none; }
    #card h2{ font-size:22px; }
    #tourbar{ top:auto; bottom:14px; left:16px; transform:none; }
  }
</style>
</head>

const smokeTex = (function(){
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0,   'rgba(255,255,255,1)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.55)');
  grad.addColorStop(1,   'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();

function makeSmoke(emitters, opts){
  opts = opts || {};
  const PER   = opts.per   || 7;
  const RISE  = opts.rise  || 9.5;
  const PEAK  = opts.peak  || 0.3;
  const COLOR = opts.color || 0xc4ccd4;
  const SP    = opts.startScale || [0.7, 0.4];   // [base, random]
  const EN    = opts.endScale   || [3.0, 1.4];
  const DRX   = opts.driftX || [1.5, 2.5];
  const group = new THREE.Group();
  group.visible = false;
  scene.add(group);
  const puffs = [];

  function reset(p, seedLife){
    p.life   = seedLife;
    p.span   = 2.8 + Math.random() * 2.2;
    p.driftX = DRX[0] + Math.random() * DRX[1];
    p.driftZ = (Math.random() - 0.5) * 2.0;
    p.jx     = (Math.random() - 0.5) * 0.5;
    p.jz     = (Math.random() - 0.5) * 0.5;
    p.startS = SP[0] + Math.random() * SP[1];
    p.endS   = EN[0] + Math.random() * EN[1];
  }

  emitters.forEach(e => {
    for(let k = 0; k < PER; k++){
      const mat = new THREE.SpriteMaterial({
        map: smokeTex, color: COLOR, transparent: true, opacity: 0,
        depthWrite: false, depthTest: true, blending: THREE.NormalBlending
      });
      const sp = new THREE.Sprite(mat);
      sp.baseX = e.x; sp.baseY = e.y; sp.baseZ = e.z;
      reset(sp, Math.random());                  // stagger so the column is full immediately
      group.add(sp);
      puffs.push(sp);
    }
  });

  function update(dt){
    if(!group.visible) return;
    for(const p of puffs){
      p.life += dt / p.span;
      if(p.life >= 1) reset(p, 0);
      const t = p.life;
      p.position.set(
        p.baseX + p.jx + p.driftX * t,
        p.baseY + RISE * t,
        p.baseZ + p.jz + p.driftZ * t
      );
      const sc = p.startS + (p.endS - p.startS) * t;
      p.scale.set(sc, sc, sc);
      p.material.opacity = PEAK * Math.sin(t * Math.PI);   // smooth fade in + out
    }
  }
  return { update, set active(v){ group.visible = v; } };
}

/* ---------- wind field: horizontal wisps drifting across a point (ambient monitoring) ---------- */
function makeWind(opts){
  const cx = opts.x, cy = opts.y, cz = opts.z;
  const COUNT = opts.count || 14;
  const SPAN  = opts.span  || 32;          // travel distance, south -> north
  const PEAK  = opts.peak  || 0.22;
  const COLOR = opts.color || 0xd2dae2;
  const DX    = opts.dx    || 3;            // slight lateral drift in x
  const ROT   = opts.rot   || 0;            // base wisp tilt in radians (screen space)
  const ROTJIT= opts.rotJitter || 0;        // +/- random spread added to each wisp's tilt
  const startZ = cz + SPAN / 2;            // start south (+z), travel toward north (-z)
  const group = new THREE.Group();
  group.visible = false;
  scene.add(group);
  const wisps = [];

  function reset(w, seedLife){
    w.life  = seedLife;
    w.span  = 2.0 + Math.random() * 1.8;     // seconds to cross
    w.y     = cy + (Math.random() - 0.5) * 6;  // spread over the tower height
    w.ox    = (Math.random() - 0.5) * 6;       // lateral spread across the path
    w.bob   = 0.4 + Math.random() * 0.6;     // vertical bob amplitude
    w.phase = Math.random() * Math.PI * 2;
    w.len   = 3.0 + Math.random() * 2.8;     // horizontal length of the wisp
    w.thin  = 0.45 + Math.random() * 0.4;    // vertical thickness
    w.material.rotation = ROT + (Math.random() - 0.5) * 2 * ROTJIT;  // wisp tilt
  }

  for(let k = 0; k < COUNT; k++){
    const mat = new THREE.SpriteMaterial({
      map: smokeTex, color: COLOR, transparent: true, opacity: 0,
      depthWrite: false, depthTest: true, blending: THREE.NormalBlending
    });
    const sp = new THREE.Sprite(mat);
    reset(sp, Math.random());                // stagger so the field is full immediately
    group.add(sp);
    wisps.push(sp);
  }

  function update(dt){
    if(!group.visible) return;
    for(const w of wisps){
      w.life += dt / w.span;
      if(w.life >= 1) reset(w, 0);
      const t = w.life;
      w.position.set(
        cx + w.ox + DX * t,
        w.y + Math.sin(t * Math.PI * 2 + w.phase) * w.bob,
        startZ - SPAN * t
      );
      w.scale.set(w.len, w.thin, 1);                 // stretched horizontal wisp
      w.material.opacity = PEAK * Math.sin(t * Math.PI);
    }
  }
  return { update, set active(v){ group.visible = v; } };
}

/* =========================================================================
   CAMERA - custom orbit with smooth tweening
   ========================================================================= */
const cam = {
  target: new THREE.Vector3(0, 4, 0),
  theta: 0.85, phi: 1.02, radius: 175,
  dTarget: new THREE.Vector3(0, 4, 0),
  dTheta: 0.85, dPhi: 1.02, dRadius: 175
};
const DEFAULT_CAM = { target:[0,4,0], theta:0.85, phi:1.02, radius:175 };

function framingScale(){
  // pull the camera back as the viewport gets narrower so the wide campus stays in frame
  const a = window.innerWidth / window.innerHeight;
  if(a >= 1.4) return 1;
  return Math.min(1 + (1.4 - a) * 0.78, 1.85);
}

function applyCamera(){
  cam.target.lerp(cam.dTarget, 0.07);
  cam.theta  += (cam.dTheta  - cam.theta)  * 0.07;
  cam.phi    += (cam.dPhi    - cam.phi)    * 0.07;
  cam.radius += (cam.dRadius - cam.radius) * 0.07;
  const r = cam.radius * framingScale();
  const sp = Math.sin(cam.phi), cp = Math.cos(cam.phi);
  camera.position.set(
    cam.target.x + r * sp * Math.sin(cam.theta),
    cam.target.y + r * cp,
    cam.target.z + r * sp * Math.cos(cam.theta)
  );
  camera.lookAt(cam.target);
}
function flyTo(preset){
  cam.dTarget.set(preset.target[0], preset.target[1], preset.target[2]);
  cam.dTheta = preset.theta;
  cam.dPhi   = preset.phi;
  cam.dRadius= preset.radius;
}

/* pointer controls */
let dragging = false, lastX = 0, lastY = 0, lastInteract = 0;
const pointers = new Map();

container.addEventListener('pointerdown', e => {
  collapseCard();
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  container.classList.add('dragging');
  container.setPointerCapture(e.pointerId);
});
container.addEventListener('pointermove', e => {
  if(!dragging) return;
  lastInteract = performance.now();
  if(pointers.size === 2){
    const pts = [...pointers.values()];
    const prevDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
    const pts2 = [...pointers.values()];
    const newDist = Math.hypot(pts2[0].x - pts2[1].x, pts2[0].y - pts2[1].y);
    cam.dRadius = THREE.MathUtils.clamp(cam.dRadius * (prevDist / Math.max(newDist, 1)), 28, 280);
    return;
  }
  pointers.set(e.pointerId, {x:e.clientX, y:e.clientY});
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  cam.dTheta -= dx * 0.005;
  cam.dPhi = THREE.MathUtils.clamp(cam.dPhi - dy * 0.004, 0.25, 1.42);
  cam.theta = cam.dTheta; cam.phi = cam.dPhi;   // direct while dragging
});
function endPointer(e){
  pointers.delete(e.pointerId);
  if(pointers.size === 0){ dragging = false; container.classList.remove('dragging'); }
}
container.addEventListener('pointerup', endPointer);
container.addEventListener('pointercancel', endPointer);
container.addEventListener('wheel', e => {
  e.preventDefault();
  lastInteract = performance.now();
  cam.dRadius = THREE.MathUtils.clamp(cam.dRadius * (1 + e.deltaY * 0.0011), 28, 280);
}, { passive:false });

function updateMarkers(){
  const w = window.innerWidth, h = window.innerHeight;
  // ensure the camera's world matrices reflect this frame's position before projecting
  camera.updateMatrixWorld();
  camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
  markerDefs.forEach(def => {
    def.v.set(def.anchor[0], def.anchor[1], def.anchor[2]).project(camera);
    const behind = def.v.z > 1;
    const x = (def.v.x * 0.5 + 0.5) * w;
    const y = (-def.v.y * 0.5 + 0.5) * h;
    if(behind || x < -80 || x > w + 80 || y < -40 || y > h + 120){
      def.el.style.opacity = '0';
      def.el.style.pointerEvents = 'none';
      return;
    }
    def.el.style.opacity = '1';
    def.el.style.pointerEvents = '';
    // single GPU transform; -50% centers horizontally, -54px lifts the stem so its base sits on the anchor
    def.el.style.transform = 'translate3d(' + x + 'px,' + (y - 54) + 'px,0) translateX(-50%)';
    def.el.style.height = '54px';
  });
}

  card.innerHTML =
    '<div class="eyebrow">' + s.num + ' / 0' + SERVICES.length + ' &middot; Alliance Technical Group</div>' +
    '<h2>' + s.name + '</h2>' +
    '<p class="tagline">' + s.tagline + '</p>' +
    '<ul>' + s.bullets.map(b => '<li>' + b + '</li>').join('') + '</ul>' +
    '<div class="tags">' + s.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' +
    '<div class="actions">' +
      '<button class="btn-ghost" id="ctaBack">Site Overview</button>' +
    '</div>';
  document.getElementById('ctaBack').addEventListener('click', clearSelection);
}

function syncUI(){
  document.querySelectorAll('.svc').forEach(el =>
    el.classList.toggle('active', el.dataset.id === activeId));
  markerDefs.forEach(def =>
    def.el.classList.toggle('sel', def.id === activeId));
}

function selectService(id, userClick){
  const s = SERVICES.find(x => x.id === id);
  if(!s) return;
  activeId = id;
  flyTo(s.cam);
  renderService(s);
  syncUI();
  expandCard();
  gensetSmoke.active  = (id === 'stack' || id === 'generator');
  turbineSmoke.active = (id === 'stack');
  windAmbient.active  = (id === 'ambient');
  if(userClick && tour.on){
    tour.idx = SERVICES.indexOf(s);
    tPos.textContent = (tour.idx + 1) + ' / ' + SERVICES.length;
    resetTourTimer();
  }
}

function clearSelection(){
  activeId = null;
  flyTo(DEFAULT_CAM);
  renderIntro();
  syncUI();
  expandCard();
  gensetSmoke.active = false;
  turbineSmoke.active = false;
  windAmbient.active = false;
}

/* ---------- tour ---------- */
function startTour(){
  tour.on = true; tour.idx = 0;
  tourbar.classList.add('on');
  tourBtn.textContent = 'Tour Running';
  goTour(0);
}
function goTour(i){
  tour.idx = (i + SERVICES.length) % SERVICES.length;
  tPos.textContent = (tour.idx + 1) + ' / ' + SERVICES.length;
  selectService(SERVICES[tour.idx].id, false);
  resetTourTimer();
}
function resetTourTimer(){
  clearTimeout(tour.timer);
  if(reduceMotion) return;            // no auto-advance for reduced motion
  tour.timer = setTimeout(() => { if(tour.on) goTour(tour.idx + 1); }, 11000);
}
function endTour(){
  tour.on = false;
  clearTimeout(tour.timer);
  tourbar.classList.remove('on');
  tourBtn.textContent = 'Start the Tour';
}
document.getElementById('tPrev').addEventListener('click', () => goTour(tour.idx - 1));
document.getElementById('tNext').addEventListener('click', () => goTour(tour.idx + 1));
document.getElementById('tEnd').addEventListener('click', () => { endTour(); clearSelection(); });
tourBtn.addEventListener('click', () => { if(!tour.on) startTour(); });

window.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight'){ tour.on ? goTour(tour.idx + 1) : selectNext(1); }
  if(e.key === 'ArrowLeft'){ tour.on ? goTour(tour.idx - 1) : selectNext(-1); }
  if(e.key === 'Escape'){ endTour(); clearSelection(); }
});
function selectNext(dir){
  const i = SERVICES.findIndex(s => s.id === activeId);
  const next = i === -1 ? (dir > 0 ? 0 : SERVICES.length - 1) : (i + dir + SERVICES.length) % SERVICES.length;
  selectService(SERVICES[next].id, true);
}

/* ---------- fullscreen ---------- */
const fsBtn = document.getElementById('fsBtn');
function fsActive(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function toggleFullscreen(){
  const root = document.documentElement;
  if(!fsActive()){
    (root.requestFullscreen || root.webkitRequestFullscreen).call(root);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}
function syncFsUI(){
  const on = fsActive();
  document.getElementById('fsIconExpand').style.display = on ? 'none' : '';
  document.getElementById('fsIconCollapse').style.display = on ? '' : 'none';
  document.getElementById('fsLabel').textContent = on ? 'Exit' : 'Fullscreen';
}
fsBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', syncFsUI);
document.addEventListener('webkitfullscreenchange', syncFsUI);
window.addEventListener('keydown', e => {
  if((e.key === 'f' || e.key === 'F') && !e.metaKey && !e.ctrlKey) toggleFullscreen();
});

/* =========================================================================
   LOOP
   ========================================================================= */
function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - (animate.last || now)) / 1000, 0.05);  // seconds, clamped
  animate.last = now;
  // gentle idle drift on the overview only
  if(!reduceMotion && !dragging && !activeId && now - lastInteract > 5000){
    cam.dTheta += 0.0006;
  }
  applyCamera();
  gensetSmoke.update(dt);
  turbineSmoke.update(dt);
  windAmbient.update(dt);
  renderer.render(scene, camera);
  // project AFTER render so the camera's world-inverse matrix is current this frame
  updateMarkers();
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

renderIntro();
syncUI();
animate();
</script>
</body>
</html>
